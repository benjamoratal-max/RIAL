name: Keep backend awake (backup manual)

# El backend de Render (plan gratuito) se duerme tras ~15 min de inactividad.
# Para mantenerlo despierto 24/7 usamos un PINGER EXTERNO (UptimeRobot /
# cron-job.org) que pega a /health cada 5 min — ver KEEP_ALIVE_SETUP.md.
#
# Este workflow quedó como BACKUP MANUAL: el cron de GitHub Actions es poco
# fiable (retrasa/saltea ejecuciones gratis) y, en repo privado, consumía casi
# toda la cuota de 2000 min/mes. Por eso se desactivó el schedule.
#
# ¿Necesitás un ping puntual? Corrélo a mano desde la pestaña "Actions".
# ¿Querés volver al ping automático? Descomentá el bloque "schedule" de abajo.

on:
  # schedule:
  #   # minuto 0,12,24,36,48 → cada 12 min. Horas 14–23 UTC (11:00–20:59 ART)
  #   - cron: '0,12,24,36,48 14-23 * * *'
  #   # Horas 0–1 UTC (21:00–22:59 ART)
  #   - cron: '0,12,24,36,48 0-1 * * *'
  # Permite ejecutarlo manualmente desde la pestaña "Actions" de GitHub.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend /health
        run: |
          echo "Pingeando el backend para mantenerlo despierto..."
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
              https://rial-zwv8.onrender.com/health || echo "000")
            echo "Intento $i → HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Backend despierto y respondiendo OK."
              exit 0
            fi
            echo "Reintentando en 15s (puede estar despertando)..."
            sleep 15
          done
          echo "El backend no respondió 200 tras 3 intentos."
          # No fallamos el workflow: un ping fallido no debe marcar error rojo.
          exit 0

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RIAL App · Alquileres Inteligentes</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="RIAL App (Rentals Intelligence & Lifestyle) centraliza alquileres premium con analíticas en tiempo real y experiencias personalizadas." />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="RIAL App" />
    
    <!-- PWA Icons -->
    <link rel="apple-touch-icon" href="/vite.svg" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect para mejor rendimiento -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- SEO Meta Tags -->
    <meta property="og:title" content="RIAL App" />
    <meta property="og:description" content="RIAL App combina IA, datos y experiencias para encontrar departamentos de media y larga estadía en LATAM." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rial.app" />
    <meta property="og:image" content="/vite.svg" />
    
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RIAL App" />
    <meta name="twitter:description" content="Explora propiedades verificadas, amenities premium y opciones flexibles en RIAL App." />
    <meta name="twitter:image" content="/vite.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="192x192" href="/rial-icon-192.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5"
    />
    <title>RIAL App · Alquileres Inteligentes</title>

    <!-- PWA -->
    <meta name="description" content="RIAL App combina IA, datos y experiencias para encontrar alquileres de media y larga estadía en Miami, Florida." />
    <meta name="theme-color" content="#0B1623" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RIAL" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" id="rial-apple-icon" href="/rial-icon-192.png" />
    <link rel="manifest" id="rial-manifest" href="/manifest.json" />
    <script>
      // Logo distinto según dispositivo:
      //  - Celulares y tablets → ícono del cerebro (manifest-mobile.json)
      //  - PC/desktop → logo RIAL wordmark (manifest.json, por defecto)
      // Se ejecuta en <head> antes de que el navegador ofrezca instalar la PWA.
      (function () {
        try {
          var ua = navigator.userAgent || '';
          var isMobileOrTablet =
            /Android|iPhone|iPod|iPad|Mobile|Tablet|Silk|Kindle|PlayBook|BlackBerry|Opera Mini|IEMobile/i.test(ua) ||
            // iPadOS 13+ se hace pasar por "Macintosh" pero tiene pantalla táctil
            (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1);
          if (isMobileOrTablet) {
            var manifest = document.getElementById('rial-manifest');
            if (manifest) manifest.setAttribute('href', '/manifest-mobile.json');
            var apple = document.getElementById('rial-apple-icon');
            if (apple) apple.setAttribute('href', '/rial-mobile-192.png');
          }
        } catch (e) {
          /* si algo falla, queda el logo por defecto */
        }
      })();
    </script>

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..700&family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph -->
    <meta property="og:title" content="RIAL App" />
    <meta property="og:description" content="Alquileres en Miami con propiedades verificadas y broker IA." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/rial-logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RIAL App" />
    <meta name="twitter:description" content="Alquileres de media y larga estadía en Miami." />
    <meta name="twitter:image" content="/rial-logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
